<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DEMONS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Courier New', monospace;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #base-img {
    position: absolute;
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    transition: opacity 0.4s;
    pointer-events: none; user-select: none;
  }
  #kaleidoscope-canvas, #shard-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #kaleidoscope-canvas { opacity: 0; transition: opacity 0.8s; }
  #ui {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 16px; z-index: 100; align-items: center;
  }
  .btn {
    background: transparent;
    border: 1px solid rgba(140,60,220,0.6);
    color: rgba(180,100,255,0.9);
    padding: 8px 20px;
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .btn:hover {
    background: rgba(140,60,220,0.15);
    border-color: rgba(180,100,255,0.9);
    color: #fff; box-shadow: 0 0 12px rgba(140,60,220,0.4);
  }
  #mode-label {
    position: fixed; top: 28px; left: 50%;
    transform: translateX(-50%);
    color: rgba(220, 80, 200, 0.85);
    font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
    z-index: 100; transition: opacity 0.5s; pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    color: rgba(220, 80, 200, 0.65);
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    pointer-events: none; transition: opacity 1s;
  }
  #loading {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: rgba(140,60,220,0.6);
    font-size: 10px; letter-spacing: 6px; text-transform: uppercase;
    z-index: 200;
  }
</style>
</head>
<body>
<div id="loading">INITIALIZING...</div>
<div id="stage">
  <img id="base-img" />
  <canvas id="kaleidoscope-canvas"></canvas>
  <canvas id="shard-canvas"></canvas>
</div>
<div id="mode-label">THE BEHOLDER</div>
<div id="hint">CLICK TO SHATTER &nbsp;|&nbsp; SPACE: KALEIDOSCOPE</div>
<div id="ui">
  <button class="btn" onclick="resetAll()">RESET</button>
  <button class="btn" onclick="toggleKaleidoscope()">KALEIDOSCOPE</button>
  <button class="btn" onclick="shatterAll()">SHATTER</button>
</div>

const kCanvas = document.getElementById('kaleidoscope-canvas');
const sCanvas = document.getElementById('shard-canvas');
const kCtx = kCanvas.getContext('2d');
const sCtx = sCanvas.getContext('2d');

const loading = document.getElementById('loading');

let beholderImg = new Image();
let imgLoaded = false;
let voronoiSeeds = [];  // bright point seeds extracted from image
let kaleidMode = false;
let shards = [];
let animId = null;
let kAnimId = null;
let kTime = 0;
let kSlices = 8;

// ─── Load + analyze image ────────────────────────────────
beholderImg.onload = () => {
  imgLoaded = true;
  img.src = IMG_SRC;
  analyzeImage();
  resizeAll();
  loading.style.opacity = '0';
  setTimeout(() => loading.remove(), 600);
};
beholderImg.src = IMG_SRC;

function analyzeImage() {
  // Sample image into small canvas to find bright/saturated points
  const W = 120, H = 60;
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const ctx = off.getContext('2d');
  ctx.drawImage(beholderImg, 0, 0, W, H);
  const data = ctx.getImageData(0, 0, W, H).data;

  const candidates = [];
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      // Luminance + purple/magenta bias
      const lum = 0.299*r + 0.587*g + 0.114*b;
      const purpleness = (r * 0.5 + b * 0.8) - g * 0.6;
      const score = lum * 0.4 + purpleness * 0.6;
      if (score > 60) {
        candidates.push({ x: x/W, y: y/H, score });
      }
    }
  }

  // Sort by score, pick top seeds with minimum spacing
  candidates.sort((a, b) => b.score - a.score);
  voronoiSeeds = [];
  const minDist = 0.08;

  for (const c of candidates) {
    let tooClose = false;
    for (const s of voronoiSeeds) {
      const dx = c.x - s.x, dy = c.y - s.y;
      if (Math.sqrt(dx*dx + dy*dy) < minDist) { tooClose = true; break; }
    }
    if (!tooClose) voronoiSeeds.push(c);
    if (voronoiSeeds.length >= 55) break;
  }

  // Pad with distributed seeds if not enough bright points
  while (voronoiSeeds.length < 40) {
    voronoiSeeds.push({
      x: 0.05 + Math.random() * 0.9,
      y: 0.05 + Math.random() * 0.9,
      score: 0
    });
  }
}

// ─── Resize ──────────────────────────────────────────────
function resizeAll() {
  kCanvas.width = window.innerWidth;
  kCanvas.height = window.innerHeight;
  sCanvas.width = window.innerWidth;
  sCanvas.height = window.innerHeight;
  if (kaleidMode) drawKaleidoscope();
}
window.addEventListener('resize', resizeAll);

// ─── Click to shatter ────────────────────────────────────
document.getElementById('stage').addEventListener('click', (e) => {
  if (!imgLoaded) return;
  createVoronoiShards(e.clientX, e.clientY);
  img.style.opacity = '0';
  kCanvas.style.opacity = '0';
  kaleidMode = false;
  if (kAnimId) { cancelAnimationFrame(kAnimId); kAnimId = null; }
  modeLabel.textContent = 'SHATTERED';
  startShardAnim();
});

// ─── Keyboard ────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); toggleKaleidoscope(); }
  if (e.code === 'KeyR') resetAll();
  if (e.key >= '2' && e.key <= '9') {
    kSlices = parseInt(e.key) * 2;
    if (kaleidMode) drawKaleidoscope();
  }
});

// ─── VORONOI SHATTER ─────────────────────────────────────
function getImgRect() {
  return img.getBoundingClientRect();
}

// Fortune's algorithm approximation: build Voronoi cells via nearest-seed assignment
function buildVoronoiPolygons(seeds, rect) {
  // Map seeds to screen space
  const screenSeeds = seeds.map(s => ({
    x: rect.left + s.x * rect.width,
    y: rect.top + s.y * rect.height,
    score: s.score
  }));

  // Add boundary seeds outside image to get clean edges
  const boundary = [
    { x: rect.left - 50, y: rect.top - 50, score: 0 },
    { x: rect.left + rect.width/2, y: rect.top - 50, score: 0 },
    { x: rect.right + 50, y: rect.top - 50, score: 0 },
    { x: rect.left - 50, y: rect.top + rect.height/2, score: 0 },
    { x: rect.right + 50, y: rect.top + rect.height/2, score: 0 },
    { x: rect.left - 50, y: rect.bottom + 50, score: 0 },
    { x: rect.left + rect.width/2, y: rect.bottom + 50, score: 0 },
    { x: rect.right + 50, y: rect.bottom + 50, score: 0 },
  ];
  const allSeeds = [...screenSeeds, ...boundary];

  // Grid-based Voronoi: sample at grid points, assign to nearest seed
  const gridW = 200, gridH = 100;
  const cellW = (rect.width + 100) / gridW;
  const cellH = (rect.height + 100) / gridH;
  const assignment = new Int32Array(gridW * gridH);

  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      const px = rect.left - 50 + (gx + 0.5) * cellW;
      const py = rect.top - 50 + (gy + 0.5) * cellH;
      let minD = Infinity, minI = 0;
      for (let si = 0; si < screenSeeds.length; si++) {
        const dx = px - screenSeeds[si].x;
        const dy = py - screenSeeds[si].y;
        const d = dx*dx + dy*dy;
        if (d < minD) { minD = d; minI = si; }
      }
      assignment[gy * gridW + gx] = minI;
    }
  }

  // For each seed, collect its grid cells and build approximate polygon
  const cells = screenSeeds.map((s, si) => {
    const pts = [];
    for (let gy = 0; gy < gridH; gy++) {
      for (let gx = 0; gx < gridW; gx++) {
        if (assignment[gy * gridW + gx] === si) {
          pts.push({
            x: rect.left - 50 + (gx + 0.5) * cellW,
            y: rect.top - 50 + (gy + 0.5) * cellH
          });
        }
      }
    }
    return { seed: s, pts };
  });

  // Convert cell points to convex hull polygon
  return cells.map(cell => ({
    seed: cell.seed,
    poly: convexHull(cell.pts)
  })).filter(c => c.poly.length >= 3);
}

function convexHull(pts) {
  if (pts.length < 3) return pts;
  pts = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const n = pts.length;
  const hull = [];

  // Lower hull
  for (let i = 0; i < n; i++) {
    while (hull.length >= 2) {
      const a = hull[hull.length-2], b = hull[hull.length-1], c = pts[i];
      if ((b.x-a.x)*(c.y-a.y) - (b.y-a.y)*(c.x-a.x) <= 0) hull.pop();
      else break;
    }
    hull.push(pts[i]);
  }
  // Upper hull
  const lower = hull.length + 1;
  for (let i = n-2; i >= 0; i--) {
    while (hull.length >= lower) {
      const a = hull[hull.length-2], b = hull[hull.length-1], c = pts[i];
      if ((b.x-a.x)*(c.y-a.y) - (b.y-a.y)*(c.x-a.x) <= 0) hull.pop();
      else break;
    }
    hull.push(pts[i]);
  }
  hull.pop();
  return hull;
}

function createVoronoiShards(cx, cy) {
  if (animId) cancelAnimationFrame(animId);
  shards = [];
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);

  const rect = getImgRect();
  const cells = buildVoronoiPolygons(voronoiSeeds, rect);

  for (const cell of cells) {
    const sx = cell.seed.x, sy = cell.seed.y;
    const screenX = rect.left + sx * rect.width;
    const screenY = rect.top + sy * rect.height;

    // Velocity based on distance from click point
    const dx = screenX - cx, dy = screenY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = Math.max(1.5, 700 / dist);
    const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.6;

    // Centroid of polygon
    const centX = cell.poly.reduce((s, p) => s + p.x, 0) / cell.poly.length;
    const centY = cell.poly.reduce((s, p) => s + p.y, 0) / cell.poly.length;

    // Jitter vertices slightly for organic feel
    const jitteredPoly = cell.poly.map(p => ({
      x: p.x + (Math.random() - 0.5) * 4,
      y: p.y + (Math.random() - 0.5) * 4
    }));

    shards.push({
      poly: jitteredPoly,
      centX, centY,
      imgRect: { ...rect },
      x: 0, y: 0,
      vx: Math.cos(angle) * force * (0.5 + Math.random() * 0.9),
      vy: Math.sin(angle) * force * (0.5 + Math.random() * 0.9) - Math.random() * 4,
      gravity: 0.15 + Math.random() * 0.15,
      rot: 0,
      rotV: (Math.random() - 0.5) * 0.05,
      alpha: 1,
      life: 1,
      score: cell.seed.score || 0
    });
  }
}

function drawShardFrame() {
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  let alive = false;

  for (const s of shards) {
    if (s.life <= 0) continue;
    alive = true;

    s.x += s.vx;
    s.y += s.vy;
    s.vy += s.gravity;
    s.vx *= 0.988;
    s.rot += s.rotV;
    s.life -= 0.007;
    s.alpha = Math.min(1, s.life * 2.5);

    sCtx.save();
    sCtx.globalAlpha = s.alpha;

    // Transform around centroid
    sCtx.translate(s.centX + s.x, s.centY + s.y);
    sCtx.rotate(s.rot);
    sCtx.translate(-s.centX, -s.centY);

    // Clip to Voronoi polygon
    sCtx.beginPath();
    sCtx.moveTo(s.poly[0].x, s.poly[0].y);
    for (let i = 1; i < s.poly.length; i++) sCtx.lineTo(s.poly[i].x, s.poly[i].y);
    sCtx.closePath();
    sCtx.clip();

    // Draw image into shard
    const ir = s.imgRect;
    sCtx.drawImage(
      beholderImg,
      0, 0, beholderImg.naturalWidth, beholderImg.naturalHeight,
      ir.left, ir.top, ir.width, ir.height
    );

    // Glowing edge — brighter on high-score (bright-point) shards
    const edgeBright = Math.min(1, 0.5 + (s.score / 200) * 0.5);
    sCtx.strokeStyle = `rgba(0, ${Math.round(180 + s.score*0.3)}, ${Math.round(200 + s.score*0.2)}, ${s.alpha * edgeBright})`;
    sCtx.lineWidth = 0.8 + (s.score / 150);
    sCtx.beginPath();
    sCtx.moveTo(s.poly[0].x, s.poly[0].y);
    for (let i = 1; i < s.poly.length; i++) sCtx.lineTo(s.poly[i].x, s.poly[i].y);
    sCtx.closePath();
    sCtx.stroke();

    sCtx.restore();
  }

  if (alive) {
    animId = requestAnimationFrame(drawShardFrame);
  } else {
    sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
    img.style.opacity = '1';
    modeLabel.textContent = 'NEON DEMONS';
    shards = [];
  }
}

function startShardAnim() {
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(drawShardFrame);
}

// ─── KALEIDOSCOPE ────────────────────────────────────────
function toggleKaleidoscope() {
  if (!imgLoaded) return;
  kaleidMode = !kaleidMode;
  if (kaleidMode) {
    img.style.opacity = '0';
    kCanvas.style.opacity = '1';
    modeLabel.textContent = `KALEIDOSCOPE ✦ ${kSlices} AXES`;
    hint.style.opacity = '0';
    animateKaleid();
  } else {
    kCanvas.style.opacity = '0';
    img.style.opacity = '1';
    if (kAnimId) cancelAnimationFrame(kAnimId);
    modeLabel.textContent = 'NEON DEMONS';
    hint.style.opacity = '1';
  }
}

function animateKaleid() {
  kTime += 0.004;
  kSpin = kTime;
  drawKaleidoscope();
  if (kaleidMode) kAnimId = requestAnimationFrame(animateKaleid);
}

function drawKaleidoscope() {
  if (!imgLoaded) return;
  const W = kCanvas.width, H = kCanvas.height;
  kCtx.clearRect(0, 0, W, H);
  kCtx.fillStyle = '#000';
  kCtx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const slices = kSlices;
  const sliceAngle = (Math.PI * 2) / slices;

  const iW = beholderImg.naturalWidth, iH = beholderImg.naturalHeight;
  const scale = Math.max(W / iW, H / iH) * 0.8;
  const sW = iW * scale, sH = iH * scale;
  const sx = cx - sW / 2, sy = cy - sH / 2;

  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  octx.drawImage(beholderImg, sx, sy, sW, sH);

  const radius = Math.min(W, H) * 0.52;

  for (let s = 0; s < slices; s++) {
    kCtx.save();
    kCtx.translate(cx, cy);
    kCtx.rotate(s * sliceAngle + kSpin);
    kCtx.beginPath();
    kCtx.moveTo(0, 0);
    kCtx.arc(0, 0, radius, -sliceAngle / 2, sliceAngle / 2);
    kCtx.closePath();
    kCtx.clip();
    if (s % 2 === 1) kCtx.scale(1, -1);
    kCtx.rotate(kTime * 0.3 * (s % 2 === 0 ? 1 : -1));
    kCtx.drawImage(off, -cx, -cy, W, H);
    kCtx.restore();
  }

  // Vignette
  const grad = kCtx.createRadialGradient(cx, cy, radius * 0.6, cx, cy, radius * 1.1);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,0.85)');
  kCtx.fillStyle = grad;
  kCtx.fillRect(0, 0, W, H);

  // Center glow
  const cGrad = kCtx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  cGrad.addColorStop(0, 'rgba(220,0,200,0.3)');
  cGrad.addColorStop(1, 'transparent');
  kCtx.fillStyle = cGrad;
  kCtx.fillRect(0, 0, W, H);

  modeLabel.textContent = `KALEIDOSCOPE ✦ ${slices} AXES`;
}

// ─── SHATTER ALL ─────────────────────────────────────────
function shatterAll() {
  createVoronoiShards(window.innerWidth / 2, window.innerHeight / 2);
  img.style.opacity = '0';
  kCanvas.style.opacity = '0';
  kaleidMode = false;
  if (kAnimId) { cancelAnimationFrame(kAnimId); kAnimId = null; }
  modeLabel.textContent = 'SHATTERED';
  startShardAnim();
}

// ─── RESET ───────────────────────────────────────────────
function resetAll() {
  if (animId) cancelAnimationFrame(animId);
  if (kAnimId) cancelAnimationFrame(kAnimId);
  shards = [];
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  kaleidMode = false;
  img.style.opacity = '1';
  kCanvas.style.opacity = '0';
  modeLabel.textContent = 'NEON DEMONS';
  hint.style.opacity = '1';
}

setTimeout(() => { hint.style.opacity = '0'; }, 4000);
</script>
